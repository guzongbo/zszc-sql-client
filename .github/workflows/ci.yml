name: ci

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-desktop-check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-desktop
          cache-workspace-crates: "true"
          workspaces: |
            . -> target

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Lint frontend
        run: npm --prefix frontend run lint

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Test desktop
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml --locked

      - name: Lint desktop
        run: cargo clippy --manifest-path desktop/src-tauri/Cargo.toml --all-targets --locked -- -D warnings

  discover-plugins:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect plugin matrix
        id: collect
        shell: bash
        run: |
          matrix="$(
            python3 -c 'import json, sys; from pathlib import Path; plugins = [{"plugin_name": manifest.parent.name, "plugin_dir": manifest.parent.as_posix(), "frontend_dir": f"{manifest.parent.as_posix()}/frontend", "backend_dir": f"{manifest.parent.as_posix()}/backend", "backend_manifest": f"{manifest.parent.as_posix()}/backend/Cargo.toml"} for manifest in sorted(Path("plugins").glob("*/package-plugin.mjs"))]; sys.exit("未找到可检查插件") if not plugins else print(json.dumps({"include": plugins}, ensure_ascii=False))'
          )"
          printf 'matrix=%s\n' "$matrix" >> "$GITHUB_OUTPUT"

  plugin-check:
    needs: discover-plugins
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-plugins.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ${{ matrix.plugin_dir }}/package-lock.json
            ${{ matrix.frontend_dir }}/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ runner.os }}-${{ matrix.plugin_name }}
          cache-workspace-crates: "true"
          workspaces: |
            ${{ matrix.backend_dir }} -> target

      - name: Install plugin packaging dependencies
        run: npm ci --prefix ${{ matrix.plugin_dir }}

      - name: Install plugin frontend dependencies
        run: npm ci --prefix ${{ matrix.frontend_dir }}

      - name: Build plugin frontend
        run: npm --prefix ${{ matrix.frontend_dir }} run build

      - name: Test plugin backend
        run: cargo test --manifest-path ${{ matrix.backend_manifest }} --locked
