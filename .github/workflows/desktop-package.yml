name: desktop-package

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mac-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: package-macos-aarch64
          workspaces: |
            . -> target

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Build macOS arm64 DMG
        shell: bash
        run: |
          unset APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD
          unset APPLE_SIGNING_IDENTITY
          npm --prefix desktop run build:mac-arm64-dmg

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: zszc-sql-client-mac-arm64-dmg
          path: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  mac-x64:
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: package-macos-x64
          workspaces: |
            . -> target

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Build macOS x64 DMG
        shell: bash
        run: |
          unset APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD
          unset APPLE_SIGNING_IDENTITY
          npm --prefix desktop run build:mac-x64-dmg

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: zszc-sql-client-mac-x64-dmg
          path: target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  windows-x64:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: package-windows-x64
          workspaces: |
            . -> target

      - name: Ensure NSIS
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
          }

      - name: Install frontend dependencies
        shell: pwsh
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        shell: pwsh
        run: npm ci --prefix desktop

      - name: Build Windows x64 NSIS package
        shell: pwsh
        run: npm --prefix desktop run build:win-x64-nsis

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: zszc-sql-client-win-x64-nsis
          path: target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7
