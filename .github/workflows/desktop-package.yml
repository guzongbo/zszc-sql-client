name: desktop-package

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mac-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Prepare Apple signing
        id: apple_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "enabled=false" >> "$GITHUB_OUTPUT"

          if [[ -z "${APPLE_CERTIFICATE:-}" || -z "${APPLE_CERTIFICATE_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "Apple 签名 secrets 未完整配置，回退到 ad-hoc 签名。"
            exit 0
          fi

          if ! python3 - <<'PY'
          import base64
          import os
          import pathlib
          import sys

          raw = os.environ["APPLE_CERTIFICATE"].strip()
          try:
              data = base64.b64decode(raw, validate=True)
          except Exception as exc:
              print(f"::warning::APPLE_CERTIFICATE 不是有效的 Base64 P12 内容: {exc}")
              sys.exit(1)

          pathlib.Path("certificate.p12").write_bytes(data)
          PY
          then
            echo "证书内容非法，回退到 ad-hoc 签名。"
            exit 0
          fi

          rm -f build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          if ! security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign; then
            echo "::warning::Apple 证书导入失败，回退到 ad-hoc 签名。请检查 APPLE_CERTIFICATE 是否为 Base64 编码的 .p12，以及 APPLE_CERTIFICATE_PASSWORD 是否正确。"
            exit 0
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep '"' | head -n 1 || true)
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          if [[ -z "$CERT_ID" ]]; then
            echo "::warning::未在导入的 keychain 中找到可用的 codesign identity，回退到 ad-hoc 签名。"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "signing_identity=$CERT_ID" >> "$GITHUB_OUTPUT"

      - name: Build macOS arm64 DMG With Apple Signing
        if: ${{ steps.apple_signing.outputs.enabled == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_signing.outputs.signing_identity }}
        run: npm --prefix desktop run build:mac-arm64-dmg

      - name: Build macOS arm64 DMG With Ad-hoc Signing
        if: ${{ steps.apple_signing.outputs.enabled != 'true' }}
        env:
          APPLE_ID: ""
          APPLE_PASSWORD: ""
          APPLE_TEAM_ID: ""
          APPLE_CERTIFICATE: ""
          APPLE_CERTIFICATE_PASSWORD: ""
          KEYCHAIN_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: ""
        run: npm --prefix desktop run build:mac-arm64-dmg

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: zszc-sql-client-mac-arm64-dmg
          path: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  mac-x64:
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Prepare Apple signing
        id: apple_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "enabled=false" >> "$GITHUB_OUTPUT"

          if [[ -z "${APPLE_CERTIFICATE:-}" || -z "${APPLE_CERTIFICATE_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "Apple 签名 secrets 未完整配置，回退到 ad-hoc 签名。"
            exit 0
          fi

          if ! python3 - <<'PY'
          import base64
          import os
          import pathlib
          import sys

          raw = os.environ["APPLE_CERTIFICATE"].strip()
          try:
              data = base64.b64decode(raw, validate=True)
          except Exception as exc:
              print(f"::warning::APPLE_CERTIFICATE 不是有效的 Base64 P12 内容: {exc}")
              sys.exit(1)

          pathlib.Path("certificate.p12").write_bytes(data)
          PY
          then
            echo "证书内容非法，回退到 ad-hoc 签名。"
            exit 0
          fi

          rm -f build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          if ! security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign; then
            echo "::warning::Apple 证书导入失败，回退到 ad-hoc 签名。请检查 APPLE_CERTIFICATE 是否为 Base64 编码的 .p12，以及 APPLE_CERTIFICATE_PASSWORD 是否正确。"
            exit 0
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep '"' | head -n 1 || true)
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          if [[ -z "$CERT_ID" ]]; then
            echo "::warning::未在导入的 keychain 中找到可用的 codesign identity，回退到 ad-hoc 签名。"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "signing_identity=$CERT_ID" >> "$GITHUB_OUTPUT"

      - name: Build macOS x64 DMG With Apple Signing
        if: ${{ steps.apple_signing.outputs.enabled == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_signing.outputs.signing_identity }}
        run: npm --prefix desktop run build:mac-x64-dmg

      - name: Build macOS x64 DMG With Ad-hoc Signing
        if: ${{ steps.apple_signing.outputs.enabled != 'true' }}
        env:
          APPLE_ID: ""
          APPLE_PASSWORD: ""
          APPLE_TEAM_ID: ""
          APPLE_CERTIFICATE: ""
          APPLE_CERTIFICATE_PASSWORD: ""
          KEYCHAIN_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: ""
        run: npm --prefix desktop run build:mac-x64-dmg

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: zszc-sql-client-mac-x64-dmg
          path: target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  windows-x64:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Ensure NSIS
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
          }

      - name: Install frontend dependencies
        shell: pwsh
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        shell: pwsh
        run: npm ci --prefix desktop

      - name: Build Windows x64 NSIS package
        shell: pwsh
        run: npm --prefix desktop run build:win-x64-nsis

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: zszc-sql-client-win-x64-nsis
          path: target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7
