name: plugins-package

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

concurrency:
  group: plugins-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-plugins:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            plugins/password-util-plugin/package-lock.json
            plugins/password-util-plugin/frontend/package-lock.json
            plugins/mock-id-generator-plugin/package-lock.json
            plugins/mock-id-generator-plugin/frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: package-plugins-${{ runner.os }}
          cache-workspace-crates: "true"
          workspaces: |
            plugins/password-util-plugin/backend -> target
            plugins/mock-id-generator-plugin/backend -> target

      - name: Install Windows cross-build dependencies
        shell: bash
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            echo "brew 不可用，无法安装 Windows 交叉编译依赖" >&2
            exit 1
          fi
          brew list llvm >/dev/null 2>&1 || brew install llvm
          brew list lld >/dev/null 2>&1 || brew install lld
          cargo xwin --version >/dev/null 2>&1 || cargo install --locked cargo-xwin

      - name: Install password-util-plugin dependencies
        run: |
          npm ci --prefix plugins/password-util-plugin
          npm ci --prefix plugins/password-util-plugin/frontend

      - name: Install mock-id-generator-plugin dependencies
        run: |
          npm ci --prefix plugins/mock-id-generator-plugin
          npm ci --prefix plugins/mock-id-generator-plugin/frontend

      - name: Build plugin packages
        run: npm run package:plugins:all

      - name: Upload password-util-plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: password-util-plugin
          path: plugins/password-util-plugin/dist/*.zszc-plugin
          if-no-files-found: error
          retention-days: 7

      - name: Upload mock-id-generator-plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: mock-id-generator-plugin
          path: plugins/mock-id-generator-plugin/dist/*.zszc-plugin
          if-no-files-found: error
          retention-days: 7
