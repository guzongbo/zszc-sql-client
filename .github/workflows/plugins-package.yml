name: plugins-package

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
  PLUGIN_PACKAGE_TARGETS: darwin-aarch64,darwin-x86_64,windows-x86_64

concurrency:
  group: plugins-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-plugins:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect plugin matrix
        id: collect
        shell: bash
        run: |
          matrix="$(
            python3 -c 'import json, sys; from pathlib import Path; plugins = [{"plugin_name": manifest.parent.name, "plugin_dir": manifest.parent.as_posix(), "frontend_dir": f"{manifest.parent.as_posix()}/frontend", "backend_dir": f"{manifest.parent.as_posix()}/backend"} for manifest in sorted(Path("plugins").glob("*/package-plugin.mjs"))]; sys.exit("未找到可打包插件") if not plugins else print(json.dumps({"include": plugins}, ensure_ascii=False))'
          )"
          printf 'matrix=%s\n' "$matrix" >> "$GITHUB_OUTPUT"

  package-plugin:
    needs: discover-plugins
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-plugins.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ${{ matrix.plugin_dir }}/package-lock.json
            ${{ matrix.frontend_dir }}/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-msvc

      - name: Cache cargo-xwin
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-xwin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-xwin-${{ runner.os }}-v1

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: package-plugin-${{ runner.os }}-${{ matrix.plugin_name }}
          cache-workspace-crates: "true"
          workspaces: |
            ${{ matrix.backend_dir }} -> target

      - name: Install Windows cross-build dependencies
        shell: bash
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            echo "brew 不可用，无法安装 Windows 交叉编译依赖" >&2
            exit 1
          fi
          brew list llvm >/dev/null 2>&1 || brew install llvm
          brew list lld >/dev/null 2>&1 || brew install lld
          cargo xwin --version >/dev/null 2>&1 || cargo install --locked cargo-xwin

      - name: Install plugin dependencies
        run: |
          npm ci --prefix ${{ matrix.plugin_dir }}
          npm ci --prefix ${{ matrix.frontend_dir }}

      - name: Build plugin package
        env:
          PLUGIN_BUILD_TARGETS: ${{ env.PLUGIN_PACKAGE_TARGETS }}
        run: npm --prefix ${{ matrix.plugin_dir }} run package

      - name: Verify packaged targets
        run: |
          package_path="${{ matrix.plugin_dir }}/dist/${{ matrix.plugin_name }}.zszc-plugin"
          python3 -c 'import json, sys, zipfile; expected = {"darwin-aarch64", "darwin-x86_64", "windows-x86_64"}; package_path = sys.argv[1]; zf = zipfile.ZipFile(package_path); manifest = json.loads(zf.read("plugin.json")); entries = manifest["backend"]["entry_by_platform"]; actual = set(entries); missing = sorted(expected - actual); extra = sorted(actual - expected); names = set(zf.namelist()); missing_files = sorted(path for path in entries.values() if path not in names); sys.exit(f"插件包平台校验失败 missing={missing} extra={extra} missing_files={missing_files}") if missing or extra or missing_files else print(f"已校验 {package_path}: {sorted(actual)}")' "$package_path"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin_name }}
          path: ${{ matrix.plugin_dir }}/dist/*.zszc-plugin
          if-no-files-found: error
          retention-days: 7
